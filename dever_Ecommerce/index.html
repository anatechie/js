<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>E-commerce</title>
</head>

<body>
    <div class="container">
        <h1>Mini E-commerce</h1>

        <div class="form">
            <input class="search" type="text" name="nomeProduto" id="nomeProduto" placeholder="Nome do produto">
            <input class="search" type="text" name="valor" id="valorProduto" placeholder="Valor do produto">
            <input class="search" type="text" name="quantidade" id="qntdProdutoDisponivel"
                placeholder="Quantidade disponivel">
            <input class="search" type="text" name="linkFoto" id="linkFoto" placeholder="Link da foto">
            <button id="botaoProduto">Adicionar Produto</button>
        </div>

        <div class="card-produtos">
            <div class="card-produto">
                <img class="imagem" src="https://picsum.photos/300/200?1" alt="Foto1">
               
                <div class="text">
                    <h3>Notebook Gamer</h3>
                    <p>Valor: R$4.500,00</p>
                    <p>Estoque: 8</p>
                </div>

            </div>
            <div class="card-produto">
                <img class="imagem" src="https://picsum.photos/300/200?2" alt="Foto2">

                <div class="text">
                    <h3>Mouse RGB</h3>
                    <p>Valor: R$120,00</p>
                    <p>Estoque: 20</p>
                </div>
            </div>

            <div class="card-produto">
                <img class="imagem" src="https://picsum.photos/300/200?3" alt="Foto3">

                <div class="text">
                    <h3>Teclado Mecânico</h3>
                    <p>Valor: R$350,00</p>
                    <p>Estoque: 12</p>
                </div>

            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
