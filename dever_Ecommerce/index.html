<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>E-commerce</title>
</head>

<body>
    <div class="container"></div>
    <h1>Mini E-commerce</h1>

    <div class="form">
        <input class="search" type="text" name="nomeProduto" id="nomeProduto" placeholder="Nome do produto">
        <input class="search" type="text" name="valor" id="valorProduto" placeholder="Valor do produto">
        <input class="search" type="text" name="quantidade" id="qntdProdutoDisponivel"
            placeholder="Quantidade disponivel">
        <input class="search" type="text" name="linkFoto" id="linkFoto" placeholder="Link da foto">
        <button id="botaoProduto">Adicionar Produto</button>
    </div>

    <div class="card-produtos">
        <div class="card-produto">
            <img src="https://picsum.photos/300/200?1" alt="Foto1">
            <div class="car-info">

            </div>
            <img src="https://picsum.photos/300/200?2" alt="Foto2">
            <div class="car-info">

            </div>
            <img src="https://picsum.photos/300/200?3" alt="Foto3">
            <div class="car-info">

            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
