
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Galeria de Fotos</h1>

    <div class="formulario">
        <input type="text" id="inputFoto" placeholder="Cole o link da imagem">
        <button id="botaoAdicionar">Adicionar Foto</button>
    </div>

    <div class="galeria" id="galeria">
        <img src="https://picsum.photos/300/200?1" alt="Foto">
        <img src="https://picsum.photos/300/200?2" alt="Foto">
    </div>

    <script src="script.js"></script>
</body>
</html>
