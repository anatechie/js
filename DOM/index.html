<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gerador de Curriculo</title>
</head>

<body>
    <div class="container"> <!--espaco principal-->
        <section id="secao-formulario"> <!--outro espaco-->
            <h2>Preencha seus dados</h2>
            <form id="formulario-curriculo">

                <div class="grupo-campo">
                    <label for="entradaNome">Nome Completo</label>
                    <input type="text" id="entradaNome" placeholder="Ex.: Ana Caroline" required>
                </div>

                <div class="grupo-campo">
                    <label for="entradaContato">Contato</label>
                    <input type="text" id="entradaContato" placeholder="Ex.: email@email 61 9 9999-9999 Brasília - DF"
                        required>
                </div>

                <div class="grupo-campo">
                    <label for="entradaResumo">Resumo Profissional</label>
                    <input type="text" id="entradaResumo" placeholder="Ex.: Breve resumo sobre sua carreira" required>
                </div>

                <div class="grupo-campo">
                    <label for="entradaExperiencia">Experiência Profissional</label>
                    <input type="text" id="entradaExperiencia"
                        placeholder="Ex.: Ex.: Empresa - Cargo( Ano Início - ANo Saída) - Função" required>
                </div>

                <div class="grupo-campo">
                    <label for="entradaFormacao">Formação Acadêmica</label>
                    <input type="text" id="entradaFormacao" placeholder="Ex.: Instituição - Curso - (ano de conclusão)"
                        required>
                </div>

                <button type="button" id="botaoGerar">Gerar Currículo</button>
            </form>
        </section>

        <section id="secao-curriculo" class="escondido">
            <div class="cartao-curriculo">

                <div class="cabecalho-curriculo">
                    <h1 id="curriculoNome"></h1>
                    <p id="curriculoContato"></p>
                </div>

                <div class="corpo-curriculo">

                    <div class="bloco-curriculo">
                        <h3>Sobre Mim</h3>
                        <p id="curriculoResumo"></p>
                    </div>

                    <div class="bloco-curriculo">
                        <h3>Experiência Profissional</h3>
                        <p id="curriculoExperiencia"></p>
                    </div>

                    <div class="bloco-curriculo">
                        <h3>Formação Acadêmica</h3>
                        <p id="curriculoFormacao"></p>
                    </div>

                </div>
            </div>
        </section>
    </div>

</body>
<script src="script.js"></script>

</html>
